apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: logistream
  labels:
    app: api-gateway
    team: backend

spec:
  replicas: 2  # 2 réplicas pour la haute disponibilité

  selector:
    matchLabels:
      app: api-gateway

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zéro interruption pendant les mises à jour

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway
          image: europe-west9-docker.pkg.dev/lustrous-oasis-490808-n0/tp2-registry/tp2-app:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          # Variables depuis le ConfigMap
          envFrom:
            - configMapRef:
                name: logistream-config

          # Variables individuelles depuis Secret
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: logistream-secrets
                  key: JWT_SECRET
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "cache"
            - name: REDIS_PORT
              value: "6379"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: logistream

spec:
  selector:
    app: api-gateway

  ports:
    - port: 80
      targetPort: 8080

  type: LoadBalancer