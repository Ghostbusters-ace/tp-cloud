apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: logistream
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: ynov_db
            - name: POSTGRES_USER
              value: ynov
            - name: POSTGRES_PASSWORD
              value: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db   # ⚠ important : correspond à DB_HOST=db
  namespace: logistream
spec:
  selector:
    app: postgres
  ports:
    - port: 5432