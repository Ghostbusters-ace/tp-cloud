apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: strimzi-autopilot-fix
  namespace: logistream
rules:
- apiGroups: ["", "apps", "extensions", "batch", "kafka.strimzi.io", "core.strimzi.io"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: strimzi-autopilot-fix-binding
  namespace: logistream
subjects:
- kind: ServiceAccount
  name: strimzi-cluster-operator
  namespace: kafka
roleRef:
  kind: Role
  name: strimzi-autopilot-fix
  apiGroup: rbac.authorization.k8s.io